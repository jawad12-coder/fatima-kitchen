[build]
  base = "."
  command = "pnpm install && pnpm --filter @workspace/fatimas-kitchen run build"
  publish = "artifacts/artifacts/fatimas-kitchen/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  BASE_PATH = "/"
  PORT = "3000"
  NODE_ENV = "production"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200"
