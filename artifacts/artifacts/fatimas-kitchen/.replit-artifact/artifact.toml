kind = "web"
previewPath = "/"
title = "Fatima's Kitchen"
version = "1.0.0"
id = "artifacts/fatimas-kitchen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20195

[services.development]
run = "pnpm --filter @workspace/fatimas-kitchen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fatimas-kitchen", "run", "build" ]
publicDir = "artifacts/fatimas-kitchen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20195"
BASE_PATH = "/"
